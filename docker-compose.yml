version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: campus-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend REST API Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: campus
      JWT_SECRET: campus-hub-secret
    depends_on:
      - db

  # Frontend Web Dashboard Service (served via Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
